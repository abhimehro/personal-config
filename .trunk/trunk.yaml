# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Trunk provides extensibility via plugins. (https://docs.trunk.io/plugins)
plugins:
  sources:
    - id: trunk
      ref: v1.8.0
      uri: https://github.com/trunk-io/plugins
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  # Trunk's markdownlint --json driver can choke on macOS stderr noise when the tool
  # exits clean with empty stdout; this long plan is already Prettier-formatted.
  ignore:
    - linters: [markdownlint]
      paths:
        - docs/plans/github-automated-pr-backlog-cleanup-2026-05-14.md
        # Large session / triage tables: Prettier-formatted; markdownlint driver flakes on multiline tables (empty JSON + stderr noise).
        - tasks/pr-review-2026-05-14.md
        - tasks/pr-triage.md
        - tasks/pr-review-session-reports.md
        - tasks/pr-inventory.md
    - linters: [prettier]
      paths:
        # Generated wide markdown tables; Prettier prompts interactively / churns.
        - tasks/pr-inventory.md
  enabled:
    - trufflehog-git@3.95.2
    - grype@0.111.1
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.3.1
    - checkov@3.2.526
    - dotenv-linter@4.0.0
    - git-diff-check
    - hadolint@2.14.0
    - isort@8.0.1
    - markdownlint@0.48.0
    - osv-scanner@2.3.5
    - oxipng@10.1.1
    - prettier@3.8.3
    - ruff@0.15.12
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - svgo@4.0.1
    - taplo@0.10.0
    - trufflehog@3.95.2
    - yamllint@1.38.0
actions:
  disabled:
    - trunk-check-pre-push-always
    - git-lfs
    - npm-check
    - poetry-install
    - submodule-init-update
    - trunk-check-pre-push
  enabled:
    - trunk-check-pre-commit
    - trunk-fmt-pre-commit
    - trufflehog-pre-commit
    - trunk-announce
    - trunk-upgrade-available

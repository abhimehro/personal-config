# Phase 2 — Jellyfin on Colima (DEFERRED)
#
# Do NOT start this until:
#   1. `colima status` is Running and `docker --context colima info` succeeds
#   2. A probe proves the host fuse-t mount is visible inside Colima, e.g.:
#        docker --context colima run --rm -v "$HOME/CloudMedia/mounted:/media:ro" alpine ls /media
#   3. Stream 2 email-security-pipeline is stable on the same Colima VM
#
# Resource budget (shared Colima VM with email-security-pipeline @ 1 CPU / 1G):
#   Jellyfin limits: 2 CPU / 2G — raise only after measuring Colima pressure.
#
# SECURITY: binds LAN 8096 only. No public publish / Traefik / Windscribe here.

services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    restart: unless-stopped
    ports:
      - "8096:8096"
      # - "8920:8920"  # HTTPS — enable only with certs + approval
    volumes:
      - jellyfin-config:/config
      - jellyfin-cache:/cache
      # Host fuse-t / FSKit mount — must be readable from Colima
      - ${HOME}/CloudMedia/mounted:/media:ro
    environment:
      - JELLYFIN_PublishedServerUrl=http://127.0.0.1:8096
      - TZ=America/Chicago
    # Prefer hardware decode on Apple Silicon only if Colima exposes it;
    # leave commented until verified (avoids broken /dev nodes).
    # devices: []
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8096/health || exit 1",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - jellyfin-net

volumes:
  jellyfin-config:
  jellyfin-cache:

networks:
  jellyfin-net:
    driver: bridge
    name: jellyfin-net

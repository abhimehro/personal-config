pre-commit:
  parallel: true
  commands:
    # Example 1: Run a linter only on staged JavaScript/TypeScript files
    eslint:
      glob: "*.{js,ts,jsx,tsx}"
      run: npx eslint {staged_files}

    # Example 2: Run a formatter
    prettier:
      glob: "*.{json,md,yaml,yml}"
      run: npx prettier --write {staged_files}

    # Example 3: Run a generic bash or fish script
    custom-check:
      glob: "*.py"
      run: ./scripts/my_check.sh

  pre-push:
    # Example 4: Run tests before pushing
    run-tests:
      run: npm test

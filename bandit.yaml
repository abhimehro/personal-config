# Bandit configuration shared by Trunk (.trunk/trunk.yaml) and CI
# (.github/workflows/code-quality.yml). Keep these in sync when adjusting.
#
# B101 (assert_used) is suppressed because Python tests in this repo use the
# unittest module, where `assert*` helpers and bare `assert` in fixtures are
# the documented idiom rather than a security risk. CI already passes
# `--skip B101`; this file ensures Trunk's bandit run agrees.

skips:
  - B101 # assert_used — required by unittest-style tests under tests/

# Directories that should not be scanned. Mirror the CI `bandit -x` flags so
# both runs agree about scope. Paths are evaluated relative to the repo root.
exclude_dirs:
  - .git
  - .trunk
  - .venv
  - node_modules
  - archive
  - configs/.config/mole
  - tests

# Label PRs based on changed file paths

documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'docs/**/*'
      - any-glob-to-any-file: 'README*'
      - any-glob-to-any-file: 'LICENSE'

configuration:
  - changed-files:
      - any-glob-to-any-file: '*.yml'
      - any-glob-to-any-file: '*.yaml'
      - any-glob-to-any-file: '.github/**/*'
      - any-glob-to-any-file: '.gitignore'
      - any-glob-to-any-file: '.cursorignore'

configs:
  - changed-files:
      - any-glob-to-any-file: 'configs/**/*'

scripts:
  - changed-files:
      - any-glob-to-any-file: '**/*.sh'
      - any-glob-to-any-file: '**/*.bash'
      - any-glob-to-any-file: 'scripts/**/*'
      - any-glob-to-any-file: 'tests/**/*'
      - any-glob-to-any-file: 'Makefile'

# Label PRs based on changed file paths

documentation:
  - any:
      - "**/*.md"
      - "docs/**/*"
      - "README*"
      - "LICENSE"

configuration:
  - any:
      - "*.yml"
      - "*.yaml"
      - ".github/**/*"
      - ".gitignore"
      - ".cursorignore"

configs:
  - any:
      - "configs/**/*"

scripts:
  - any:
      - "**/*.sh"
      - "**/*.bash"
      - "scripts/**/*"
      - "tests/**/*"
      - "Makefile"

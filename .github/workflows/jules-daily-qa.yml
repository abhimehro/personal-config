name: Jules Daily QA & Agentic Review

on:
  schedule:
    - cron: "0 10 * * *" # Daily at 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  trigger-jules:
    name: Request Jules Agentic Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Trigger Jules QA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > prompt.md
          @google-labs-jules Please act as an agentic QA engineer for this repository.

          Your tasks:
          1. Check that the code builds and runs.
          2. Check that the tests pass.
          3. Check that instructions are clear and code is well-structured.
          4. Search for any previous "Jules Daily QA & Agentic Review" open discussions/issues. If the status is the same, just comment that you found nothing new.
          5. If you find small problems you can fix with high confidence, create a PR.
          6. Summarize your findings in this issue. Use note form. Highlight any bash commands you used.

          If the repository is perfectly healthy, simply state that and close this issue.
          EOF

          gh issue create \
            --title "Daily QA Check - $(date +'%Y-%m-%d')" \
            --body-file prompt.md \
            --label "automation,qa"

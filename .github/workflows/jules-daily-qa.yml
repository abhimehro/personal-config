name: Jules Daily QA & Agentic Review

on:
  schedule:
    - cron: "0 10 * * *" # Daily at 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  contents: write

jobs:
  trigger-jules:
    name: Request Jules Agentic Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Trigger Jules QA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat << 'EOF' > prompt.md
          @google-labs-jules You are an agentic QA engineer conducting an automated daily review of a GitHub repository. Your objective is to assess and maintain the repository in a healthy, functional, and maintainable state—adapting your review depth and priorities to the repository's specific domain.

          ## Role
          You are an agentic QA engineer conducting an automated daily review of a GitHub repository. Your objective is to assess and maintain the repository in a healthy, functional, and maintainable state—adapting your review depth and priorities to the repository's specific domain.

          ---

          ## Repository Context
          - **Name:** personal-config
          - **Domain:** Personal configuration files, scripts, and system preferences
          - **Domain-Specific Priorities:** Configuration correctness, script reliability, no hardcoded secrets, environment variable hygiene

          ---

          ## Review Workflow

          ### 1. Verification
          - Confirm the codebase builds and runs without errors.
          - Verify all tests pass.
          - Assess code quality, structure, and documentation clarity.
          - Apply domain-specific priorities (defined above) when evaluating correctness, security, and reliability.

          ### 2. Historical Check
          - Search for any open issues titled starting with **"Daily QA Check - "** or labeled with **automation** and **qa** that were created by this workflow.
          - If one exists with an unchanged status, add a status comment rather than duplicating work, instead of opening a new issue.

          ### 3. Actionable Insights
          - For high-confidence minor fixes, open a pull request directly.
          - Summarize all findings in concise note-form.
          - Highlight any bash commands used during verification.

          ### 4. Closure
          - If the repository is fully healthy with no findings, state this explicitly and close the issue.

          ---

          ## Output Format
          - Note-form summaries (brief, scannable)
          - Bash commands clearly highlighted
          - Issue closed if no problems found
          EOF

          gh issue create \
            --title "Daily QA Check - $(date +'%Y-%m-%d')" \
            --body-file prompt.md \
            --label "automation,qa"

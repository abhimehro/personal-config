# .github/workflows/mac-audit.yml
name: Mac Audit

on:
  push:
    branches: ["main"]
    paths:
      - "mac-audit/**"
      - ".github/workflows/mac-audit.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "mac-audit/**"
      - ".github/workflows/mac-audit.yml"
  schedule:
    - cron: "0 9 * * 1" # Every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
      - name: Lint scripts
        run: shellcheck mac-audit/audit.sh mac-audit/lib/*.sh

  audit:
    name: Mac Audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: shellcheck

    strategy:
      matrix:
        os: [macos-14, macos-15]
      fail-fast: false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Make executable
        run: chmod +x mac-audit/audit.sh

      - name: Audit — Launch Agents
        run: mac-audit/audit.sh --module launch

      - name: Audit — Homebrew Sprawl
        run: mac-audit/audit.sh --module brew

      - name: Audit — macOS Security Defaults
        run: mac-audit/audit.sh --module defaults --ci

      - name: Save report artifact
        if: always()
        run: |
          mkdir -p mac-audit/reports
          mac-audit/audit.sh --module all --ci 2>&1 \
            | sed 's/\x1b\[[0-9;]*m//g' \
            > mac-audit/reports/audit-${{ runner.os }}-${{ github.sha }}.txt || true

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1        uses: actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: audit-report-${{ matrix.os }}
          path: mac-audit/reports/*.txt
          retention-days: 30

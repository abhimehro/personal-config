name: Security Scan

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'CODE_OF_CONDUCT.md'
      - 'CONTRIBUTING.md'
  schedule:
    - cron: '0 0 * * 0'  # Run weekly on Sundays at midnight UTC
  workflow_dispatch:

jobs:
  trufflehog-secrets:
    name: TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Full history for better scanning

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          filter: files
          only-verified: true
          fail: true
          json: false
          no-update: false
          extra-args: --debug
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  gitleaks-secrets:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .github/gitleaks.toml

  shellcheck-security:
    name: ShellCheck Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all scripts
        run: |
          echo "Running ShellCheck security scan..."
          find . \
            \( -path "./.git" -o -path "./.trunk" -o -path "./configs/.config/mole" -o -path "./mole.*" -o -path "*/archive" -o -path "./node_modules" \) -prune -o \
            -name "*.sh" -type f -print0 | while IFS= read -r -d '' script; do
            echo "Scanning: $script"
            shellcheck --severity=error --format=gcc "$script" || true
          done
          echo "✅ ShellCheck security scan complete"

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install safety
        run: pip install safety

      - name: Run safety check
        run: |
          echo "Running Python dependency security scan..."
          find . -name "requirements*.txt" -type f | while read -r req_file; do
            echo "Scanning: $req_file"
            safety check --file "$req_file" --output json || true
          done
          echo "✅ Dependency scan complete"

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'python']

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        id: sbom
        with:
          image: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [trufflehog-secrets, gitleaks-secrets, shellcheck-security, dependency-scan, codeql-analysis, sbom-generation]
    if: always()

    steps:
      - name: Generate Security Report
        run: |
          echo "# Security Scan Summary" > security-report.md
          echo "" >> security-report.md
          echo "## Scan Results" >> security-report.md
          echo "" >> security-report.md
          
          echo "| Scan | Status | Details |" >> security-report.md
          echo "|------|--------|---------|" >> security-report.md
          
          # Check each job status
          echo "| TruffleHog | ${{ needs.trufflehog-secrets.result }} | Secrets detection |" >> security-report.md
          echo "| Gitleaks | ${{ needs.gitleaks-secrets.result }} | Git secrets scanning |" >> security-report.md
          echo "| ShellCheck | ${{ needs.shellcheck-security.result }} | Shell script security |" >> security-report.md
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} | Python dependencies |" >> security-report.md
          echo "| CodeQL | ${{ needs.codeql-analysis.result }} | Static code analysis |" >> security-report.md
          echo "| SBOM | ${{ needs.sbom-generation.result }} | Software Bill of Materials |" >> security-report.md
          echo "" >> security-report.md
          
          # Overall status
          if [[ "${{ needs.trufflehog-secrets.result }}" == "success" && \
                "${{ needs.gitleaks-secrets.result }}" == "success" && \
                "${{ needs.shellcheck-security.result }}" == "success" && \
                "${{ needs.dependency-scan.result }}" == "success" ]]; then
            echo "## ✅ All security scans passed" >> security-report.md
          else
            echo "## ⚠️  Some security scans failed" >> security-report.md
            echo "Please review the failed scans above." >> security-report.md
          fi
          
          cat security-report.md
          
      - name: Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.md
          retention-days: 30
name: Case Collision Check

on:
  pull_request: {}
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  case-collision:
    name: Reject case-colliding paths
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check tracked paths for case collisions
        run: ./scripts/check_case_collisions.sh

name: Case Collision Check

on:
  pull_request: {}
  push:
    branches:
      - main
      - master
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  case-collision:
    name: Reject case-colliding paths
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check tracked paths for case collisions
        run: ./scripts/check_case_collisions.sh

# abhi-1321: noop to retrigger path-filtered PR checks

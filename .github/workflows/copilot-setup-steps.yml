name: Development Partner
description: The Development Partner Protocol

on:
  workflow_dispatch:
    inputs:
      request:
        description: "Specific request for the development partner"
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [opened, labeled]

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python Environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      # SECURITY: bind untrusted workflow_dispatch input via step env (REQUEST),
      # not direct interpolation inside actions/github-script `script:` blocks.
      # Same env-var pattern as summary.yml (issue #892); CWE-94 / ABHI-963.
      - name: Development Partner Session
        uses: actions/github-script@v9.0.0 # v9.0.0
        env:
          REQUEST: ${{ github.event.inputs.request }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('🤝 Development Partner Protocol Activated');
            console.log('Repository:', context.repo.owner + '/' + context.repo.repo);
            console.log('Event:', context.eventName);

            // SECURITY: bind untrusted workflow_dispatch input via env var to
            // prevent script injection (CWE-94).  Direct interpolation of
            // github.event.inputs.request into a JS string literal allows
            // an attacker to break out of the quotes and execute arbitrary
            // code.  See: github/codeql-action advisories.
            const request = process.env.REQUEST || '';
            if (request) {
              console.log('Request:', request);
            }

      - name: PR Review Assistant
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9.0.0 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Auto-comment on PRs with development partner context
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '👋 Development Partner is reviewing this PR. Will provide feedback shortly.'
            });

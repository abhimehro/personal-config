name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@a7805884c80886efc241e94a5351df715968a0ad # v2.1.1
        with:
          prompt: |
            Summarize the following GitHub issue in one paragraph:
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      # SECURITY: do not interpolate ${{ steps.inference.outputs.response }} or
      # any other untrusted field directly into a `run:` block. The LLM output
      # is attacker-influenceable via prompt injection in the issue body, so a
      # crafted response can break out of shell quoting and execute commands
      # in the runner with GITHUB_TOKEN available. Bind the value to an env
      # var and pass it as a quoted shell argument instead. See issue #892.
      - name: Comment with AI summary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESPONSE: ${{ steps.inference.outputs.response }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$RESPONSE"

schema_version: 1
repository:
  default_branch: main
automation:
  human_review_label: needs-human-review
  protected_paths:
    - auth/**
    - migrations/**
    - database/**
    - db/**
  reporting:
    daily_issue_prefix: "[repo-automation] Daily Status Report"
    weekly_issue_prefix: "[repo-automation] Weekly Retrospective"
  workflow_updater:
    enabled: true
    create_draft_pr: true
    branch_prefix: automation/workflow-updates
    commit_message: "chore(actions): consolidate and refresh workflow dependencies"
    pr_title: "chore(actions): consolidate workflow automation"
    allowed_paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
      - .github/actions/**/*.yml
      - .github/actions/**/*.yaml
  performance_optimizer:
    enabled: true
    commands:
      - name: benchmark core scripts
        run: make benchmark
        optional: true
        timeout_seconds: 1200
    suggestions:
      - Compare benchmark deltas against the previous run before merging performance-sensitive shell changes.
      - Review the largest shell and Python files surfaced in the report for opportunities to split hot paths into smaller helpers.
  quality_assurance:
    enabled: true
    setup_commands:
      - name: install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
        optional: false
        timeout_seconds: 900
    commands:
      - name: shellcheck regression gate
        run: make lint-errors
        optional: false
        timeout_seconds: 900
      - name: smoke tests
        run: make test-quick
        optional: false
        timeout_seconds: 1200
      - name: full shell and python test suite
        run: make test-all
        optional: false
        timeout_seconds: 2400
      - name: trunk lint parity
        run: make lint
        optional: true
        timeout_seconds: 1800
  backlog_manager:
    enabled: true
    stale_days: 14
    max_issues: 10
    max_pull_requests: 10
    include_discussions: false
    create_tracking_issue: false
  status_report:
    enabled: true
    publish_issue: true
    labels: []
  weekly_retrospective:
    enabled: true
    publish_issue: true
    labels: []
    auto_apply_safe_changes: false
    branch_prefix: automation/weekly-workflow-tuning
    commit_message: "chore(actions): apply safe weekly automation tuning"
    allowed_paths:
      - .github/**
    safe_adjustment_commands: []
